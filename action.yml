name: "SecureOps Scan"
description: "Run SecureOps security scan"

inputs:
  url:
    description: "Target URL to scan (single mode)"
    required: false

  urls:
    description: "Multiple target URLs (JSON array, CSV, or newline-separated). Same domain required by backend multi-scan."
    required: false

  api_key:
    description: "SecureOps API key"
    required: true

  fail_on_score_below:
    description: "Fail if score is below this value"
    required: false
    default: "0"

  poll_interval_seconds:
    description: "Polling interval for async job status"
    required: false
    default: "2"

  max_wait_seconds:
    description: "Maximum wait time for async scan completion"
    required: false
    default: "180"

outputs:
  score:
    description: "Security score"

runs:
  using: "node20"
  main: "dist/index.js"
